name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports: ['27017:27017']
        options: --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 3s --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/sportsamigo_test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: test-session-secret-for-ci
          RAZORPAY_KEY_ID: test_key_id
          RAZORPAY_KEY_SECRET: test_key_secret
        run: npm test -- --coverage --ci --forceExit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage/
          retention-days: 7

  test-frontend:
    name: Frontend Tests and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          CI: true
          REACT_APP_API_URL: http://localhost:5000
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:5000
        run: npm run build

      - name: Verify build output exists
        run: test -f frontend/build/index.html

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t sportsamigo-backend:ci ./backend

      - name: Build frontend Docker image
        run: docker build --build-arg REACT_APP_API_URL=http://localhost:5000 -t sportsamigo-frontend:ci ./frontend

      - name: Verify backend image health endpoint
        run: |
          docker run -d --name backend-test -e NODE_ENV=test -e MONGO_URI=mongodb://host.docker.internal:27017/test -e REDIS_URL=redis://host.docker.internal:6379 -e SESSION_SECRET=test -p 5001:5000 sportsamigo-backend:ci
          sleep 5
          curl --fail http://localhost:5001/health || echo "Health check skipped (DB not available in this step)"
          docker stop backend-test || true
